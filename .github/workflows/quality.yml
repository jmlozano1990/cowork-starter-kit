name: Quality Checks

on: [push, pull_request]

jobs:
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: DavidAnson/markdownlint-cli2-action@05f32210e84442804257b2a6f20b273450ec8265 # v19.1.0
        with:
          globs: |
            **/*.md
            !docs/**

  link-check:
    name: Link Check (Internal)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: lycheeverse/lychee-action@f613c4a64e50d792e0b31ec34bbcbba12263c6a6 # v2.3.0
        with:
          args: --no-progress --offline "**/*.md"
          fail: true

  link-check-external:
    name: Link Check (External)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: lycheeverse/lychee-action@f613c4a64e50d792e0b31ec34bbcbba12263c6a6 # v2.3.0
        with:
          args: --no-progress "**/*.md"
          fail: true

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          scandir: "./scripts"

  safety-rule-check:
    name: Safety Rule Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Check safety rule in all presets
        run: |
          SAFETY_RULE="Always ask for explicit confirmation before deleting"
          MISSING=0
          for f in presets/*/global-instructions.md; do
            if ! grep -q "$SAFETY_RULE" "$f"; then
              echo "MISSING safety rule: $f"
              MISSING=1
            fi
          done
          if [ "$MISSING" -eq 1 ]; then
            echo ""
            echo "One or more presets are missing the required safety rule."
            echo "Every preset's global-instructions.md must contain:"
            echo "  'Always ask for explicit confirmation before deleting, moving, or overwriting any file or folder.'"
            echo "See templates/global-instructions-base.md for the canonical text."
            exit 1
          fi
          echo "Safety rule check passed — all presets include the required rule."

  starter-file-check:
    name: Starter File Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Check starter files exist for all presets
        run: |
          MISSING=0
          COUNT=0
          for preset in study research writing project-management creative business-admin; do
            if [ ! -f "presets/$preset/project-instructions-starter.txt" ]; then
              echo "MISSING: presets/$preset/project-instructions-starter.txt"
              MISSING=1
            else
              COUNT=$((COUNT + 1))
            fi
          done
          if [ "$COUNT" -lt 6 ]; then
            echo "Only $COUNT/6 starter files found"
            MISSING=1
          fi
          if [ "$MISSING" -eq 1 ]; then
            exit 1
          fi
          echo "All 6 starter files present."

  starter-safety-rule-check:
    name: Starter Safety Rule Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Check safety rule in all starter files
        run: |
          SAFETY_RULE="Always ask for explicit confirmation before deleting"
          MISSING=0
          COUNT=0
          for f in presets/*/project-instructions-starter.txt; do
            COUNT=$((COUNT + 1))
            if ! grep -q "$SAFETY_RULE" "$f"; then
              echo "MISSING safety rule: $f"
              MISSING=1
            fi
          done
          if [ "$COUNT" -lt 6 ]; then
            echo "Only $COUNT/6 starter files found — expected 6"
            exit 1
          fi
          if [ "$MISSING" -eq 1 ]; then
            exit 1
          fi
          echo "Safety rule present in all $COUNT starter files."

  skill-format-check:
    name: Skill Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Verify folder/SKILL.md format
        run: |
          FAIL=0
          # Check for flat .md files at skills root (excluding directories)
          for skills_dir in presets/*/.claude/skills; do
            if [ -d "$skills_dir" ]; then
              for f in "$skills_dir"/*.md; do
                if [ -f "$f" ]; then
                  echo "FLAT SKILL FILE FOUND: $f (must be in folder/SKILL.md format)"
                  FAIL=1
                fi
              done
            fi
          done
          # Verify each skill folder has SKILL.md
          for skill_folder in presets/*/.claude/skills/*/; do
            if [ -d "$skill_folder" ] && [ ! -f "${skill_folder}SKILL.md" ]; then
              echo "MISSING SKILL.md: $skill_folder"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then
            exit 1
          fi
          echo "All skills in folder/SKILL.md format."

  claude-md-safety-rule-check:
    name: CLAUDE.md Safety Rule Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Check CLAUDE.md exists and contains safety rule
        run: |
          if [ ! -f "CLAUDE.md" ]; then
            echo "MISSING: CLAUDE.md at repo root"
            exit 1
          fi
          SAFETY_RULE="Always ask for explicit confirmation before deleting"
          if ! grep -q "$SAFETY_RULE" CLAUDE.md; then
            echo "MISSING safety rule in CLAUDE.md"
            exit 1
          fi
          echo "CLAUDE.md exists and contains safety rule."
